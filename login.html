<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - Banking Portal</title>
  <link rel="stylesheet" href="css/account-form.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <i class="fas fa-bank auth-logo"></i>
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your banking portal</p>
    </div>
    
    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label for="email">
          <i class="fas fa-envelope"></i>
          Email Address
        </label>
        <div class="input-group">
          <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">
          <i class="fas fa-lock"></i>
          Password
        </label>
        <div class="input-group">
          <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
          <button type="button" class="password-toggle" title="Toggle password visibility">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      
      <div class="form-group">
        <div class="remember-forgot">
          <label class="checkbox-label">
            <input type="checkbox" name="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary btn-block">
        <i class="fas fa-sign-in-alt"></i>
        Sign In
      </button>

      <div class="social-login">
        <p class="divider"><span>or continue with</span></p>
        <div class="social-buttons">
          <button type="button" class="btn btn-social">
            <i class="fab fa-google"></i>
          </button>
          <button type="button" class="btn btn-social">
            <i class="fab fa-facebook-f"></i>
          </button>
          <button type="button" class="btn btn-social">
            <i class="fab fa-apple"></i>
          </button>
        </div>
      </div>
    </form>
    
    <p class="auth-footer">
      Don't have an account? <a href="register.html">Create account</a>
    </p>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
