<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Account Form</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/account-form.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
  <!-- Include Navbar -->
  <div id="navbar-placeholder"></div>

  <main class="main">
    <div class="page-header">
      <h1><i class="ri-bank-line"></i> Account Form</h1>
      <p class="subtitle">Create or edit your account</p>
    </div>

    <div class="form-container">
      <form id="accountForm" class="account-form">
        <div class="form-group">
          <label for="accountName">Account Name</label>
          <input type="text" id="accountName" name="name" required>
        </div>

        <div class="form-group">
          <label for="accountType">Account Type</label>
          <select id="accountType" name="type" required>
            <option value="Savings">Savings Account</option>
            <option value="Checking">Checking Account</option>
          </select>
        </div>

        <div class="form-group">
          <label for="accountNumber">Account Number</label>
          <input type="text" id="accountNumber" name="number" required pattern="[0-9]{10}" title="Please enter a 10-digit account number">
        </div>

        <div class="form-group">
          <label for="accountBalance">Initial Balance</label>
          <input type="number" id="accountBalance" name="balance" required min="0" step="0.01">
        </div>

        <div class="form-group">
          <label for="accountStatus">Status</label>
          <select id="accountStatus" name="status" required>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Pending">Pending</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="ri-save-line"></i>
            Save Account
          </button>
          <a href="accounts.html" class="btn btn-secondary">
            <i class="ri-close-line"></i>
            Cancel
          </a>
        </div>
      </form>
    </div>
  </main>

  <!-- Include Footer -->
  <div id="footer-placeholder"></div>

  <script src="js/app.js"></script>
  <script src="js/account-form.js"></script>
</body>
</html>
