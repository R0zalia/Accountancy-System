<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Payment</title>
    <link rel="stylesheet" href="css/record-payment.css">
</head>
<body>
    <div class="container">
        <h1>Record Payment</h1>
        
        <div id="transactionInfo" class="transaction-info">
            <!-- Transaction info will be loaded here -->
        </div>
        
        <form id="paymentForm">
            <input type="hidden" id="transactionId">
            
            <div class="form-group">
                <label for="paymentAmount">Payment Amount</label>
                <input type="number" id="paymentAmount" min="0" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="paymentDate">Payment Date</label>
                <input type="date" id="paymentDate" required>
            </div>
            
            <div class="form-group">
                <label for="paymentMethod">Payment Method</label>
                <select id="paymentMethod" required>
                    <option value="">Select Method</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="Credit Card">Credit Card</option>
                    <option value="Cash">Cash</option>
                    <option value="Check">Check</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="referenceNumber">Reference Number</label>
                <input type="text" id="referenceNumber">
            </div>
            
            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" rows="3"></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Record Payment</button>
        </form>
    </div>
    
    <script src="js/record-payment.js"></script>
</body>
</html>
